name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-patterns:
    name: validate-patterns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate all patterns
        run: node scripts/validate.mjs
